<!doctype html><html lang="en"><head>
<script>
(function () {
  var API_ORIGIN = "https://param-task-middleware.onrender.com";
  var TOKEN_KEY = 'ts2_token';
  function getToken() { try { return localStorage.getItem(TOKEN_KEY); } catch (e) { return null; } }
  function setToken(t) { try { localStorage.setItem(TOKEN_KEY, t); } catch (e) {} }
  function clearToken() { try { localStorage.removeItem(TOKEN_KEY); } catch (e) {} }
  var _fetch = window.fetch.bind(window);
  window.fetch = async function (input, init) {
    init = init || {};
    var url = typeof input === 'string' ? input : (input && input.url);
    if (url && url.charAt(0) === '/') { url = API_ORIGIN + url; }
    // Cookie fallback (same-origin / defense in depth).
    init.credentials = 'include';
    // Primary auth: send the stored session token as a Bearer header. This
    // works with NO cross-site cookie, so login survives strict third-party-
    // cookie browsers.
    var tok = getToken();
    if (tok) { init.headers = Object.assign({}, init.headers, { Authorization: 'Bearer ' + tok }); }
    var res = await _fetch(url, init);
    // Capture the token from the login response header BEFORE returning, so it
    // is stored before the caller fires its first authed request (no race).
    if (url && url.indexOf('/api/login') >= 0) {
      var t = res.headers.get('X-Session-Token');
      if (t) setToken(t);
    }
    if (url && url.indexOf('/api/logout') >= 0) { clearToken(); }
    // Keep mirroring the CSRF token (cookie-auth fallback still uses it).
    if (url && url.indexOf('/api/session') >= 0) {
      res.clone().json().then(function (d) {
        if (d && d.csrfToken) { document.cookie = 'ts2_csrf=' + d.csrfToken + '; Path=/; SameSite=Lax'; }
      }).catch(function () {});
    }
    return res;
  };
  // Disable the dev-only live-reload stream (cross-origin, not needed live).
  window.EventSource = function () {
    return { close: function () {}, addEventListener: function () {}, set onmessage(v) {}, set onerror(v) {} };
  };
})();
</script><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin · Task Queue — Param Culture</title>
<style>
/* Shared SKIN tokens — ONE file, the single source of truth for the whole
   product's look. Loaded by BOTH the board (frontend/index.html) and the admin
   page (middleware/admin/admin.html) via <link>, BEFORE topbar.css/chrome.css.

   To reskin the entire app, change only the values here. Neither page keeps its
   own copy of these tokens any more — that duplication is exactly what let the
   two pages drift apart before (and once silently replaced "TASK SHEET" with
   "PARAM"). Edit here only; do not re-add a :root token block to either page.

   Light look only — dark mode intentionally not used. */
:root {
  --skin-bg:        #f7f4ee;
  --skin-surface:   #fffdf8;
  --skin-surface-strong: #f0ebe2;
  --skin-ink:       #25221d;
  --skin-ink-soft:  #6f675c;
  --skin-accent:    #4f7a3a;
  --skin-accent-ink:#ffffff;
  --skin-line:      #ded5c8;
  --skin-radius:    8px;
  --skin-gap:       20px;
  --skin-font:      ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --skin-shadow:    0 16px 42px rgba(32, 28, 22, 0.08);
  --skin-pill-h:    27px; /* 20% shorter */
  --pri-high:       #a63d4f;
  --pri-medium:     #c99b25;
  --pri-low:        #2f6f9f;
  /* Task status colors */
  --stat-assigned:  #4f7a3a;  /* medium sap green */
  --stat-ongoing:   #c99b25;  /* medium chrome yellow */
  --stat-paused:    #808080;  /* 30% grey */
  --stat-rejected:  #d97766;  /* medium pastel brick red */
  --stat-approved:  #4f7a3a;  /* medium sap green — shown as "Completed" */
  --stat-completed: #9a9a9a;  /* grey: done, WAITING for approval */
  --stat-revision:  #c99b25;  /* chrome yellow: sent back, work resumes */
  --stat-cancelled: #55504a;  /* dark warm grey: closed without approval */
}

</style>
<style>
/* Shared topbar — ONE file, loaded by both the board (frontend/index.html)
   and the admin page (middleware/admin/admin.html). Page-agnostic: it only
   assumes the skin CSS variables (--skin-*) are already defined by the page
   that includes it. Edit here only — do not fork a copy into either page. */
.topbar {
  display: flex; align-items: center; justify-content: flex-end; gap: 8px; height: 25px;
  padding: 0 var(--skin-gap); background: var(--skin-surface); border-bottom: 0;
  font-size: 12px; color: var(--skin-ink-soft); position: sticky; top: 0; z-index: 6;
}
.topbar-items { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }

.topbar .devguide { margin: 0; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 20px; }
.topbar .devguide input {
  width: 14px; height: 14px; cursor: pointer; margin: 0 2px 0 0; accent-color: var(--skin-accent);
  opacity: 1; pointer-events: auto; visibility: visible;
  flex-shrink: 0;
}
.topbar .devguide .lbl { cursor: pointer; margin: 0; padding-left: 18px; font-size: 12px; color: var(--skin-ink-soft); }

.topbar .user-tools { display: flex; gap: 8px; align-items: center; }
.topbar .user-pill {
  background: none; border: none; padding: 0; display: flex; align-items: center; gap: 4px;
  color: var(--skin-ink-soft); font-size: 12px; height: auto;
}
.topbar .user-pill svg { width: 14px; height: 14px; fill: currentColor; }
.topbar .user-pill-role { font-weight: 400; }
.topbar .signout-button {
  background: none; border: none; padding: 0; height: auto; width: auto; color: var(--skin-accent);
  cursor: pointer; font-size: 12px; font-weight: 600; text-decoration: underline; font-family: inherit;
}
.topbar .signout-button:hover { opacity: 0.7; }
.topbar .signin-link {
  background: none; border: none; padding: 0; height: auto; width: auto; color: var(--skin-accent);
  cursor: pointer; font-size: 12px; font-weight: 600; text-decoration: underline; font-family: inherit;
}
.topbar .signin-link:hover { opacity: 0.7; }

</style>
<style>
  /* Colours come from the shared skin (middleware/shared/skin.css) so a reskin
     propagates here too — these aliases just map this page's local names onto
     the shared --skin-* tokens. --danger/--warn are queue-only accents. */
  :root{--bg:var(--skin-bg);--surface:var(--skin-surface);--ink:var(--skin-ink);
        --soft:var(--skin-ink-soft);--accent:var(--skin-accent);--accentink:var(--skin-accent-ink);
        --line:var(--skin-line);--radius:var(--skin-radius);--font:var(--skin-font);
        --danger:#a04b3c;--warn:#9c7c3c}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);padding:0 20px 80px}
  .wrap{max-width:980px;margin:0 auto;padding-top:22px}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--soft);font-size:14px;margin:0 0 22px}
  .bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  button{font-family:var(--font);border:1px solid var(--line);border-radius:var(--radius);
         padding:9px 16px;font-size:14px;background:var(--surface);cursor:pointer}
  button.primary{background:var(--accent);color:var(--accentink);border-color:var(--accent);font-weight:600}
  button:disabled{opacity:.45;cursor:default}
  .count{font-size:13px;color:var(--soft)}
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);
        border-radius:12px;overflow:hidden;font-size:14px}
  th,td{padding:10px 12px;text-align:left;border-top:1px solid var(--line);vertical-align:top}
  thead th{background:#f0ebe2;border-top:0;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--soft)}
  .task{font-weight:600}
  .meta{color:var(--soft);font-size:12px;margin-top:2px}
  select{font-family:var(--font);padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:13px}
  select.silly{border-color:var(--warn)} select.reject{border-color:var(--danger)}
  .empty{padding:48px;text-align:center;color:var(--soft);background:var(--surface);
         border:1px dashed var(--line);border-radius:12px}
  #msg{margin:14px 0;font-size:14px;min-height:20px}
  #msg.err{color:var(--danger)} #msg.ok{color:var(--accent)}
  .pill{display:inline-block;background:#f0ebe2;border-radius:20px;padding:2px 10px;font-size:12px;margin-left:6px}
  a.back{color:var(--soft);font-size:13px;text-decoration:none}
</style></head><body>
<div id="topbar-mount"></div>
<div class="wrap">
  <a class="back" href="admin.html" data-content="Queue-Back">&larr; Admin</a>
  <h1 data-content="Queue-Title">Task Queue</h1>
  <p class="sub">Every new task waits here until you decide it. <b>real</b> = normal task ·
     <b>routine</b> = logged but never counted as completed · <b>silly</b> = filed to the
     person's "my notes", never on the board · <b>reject</b> = dropped.</p>
  <div class="bar">
    <button id="refresh" data-content="Queue-Refresh">Refresh</button>
    <button id="push" class="primary" disabled data-content="Queue-Push">Push decisions</button>
    <span class="count" id="count"></span>
  </div>
  <div id="msg"></div>
  <div id="list"></div>
</div>
<!-- Shared topbar (role pill / sign out / Guide), same as the board + admin. -->
<script>
/**
 * Shared topbar — ONE file, loaded by both the board and the admin page.
 * Injects its own markup into #topbar-mount, then wires role display and
 * sign out. Page-agnostic: talks only to /api/session and /api/logout,
 * which both pages already serve from the same middleware. Edit here only.
 */
(function () {
  'use strict';
  var PROFILE_NAME = { 1: 'Public Viewer', 2: 'User', 3: 'Moderator', 4: 'Super Admin' };

  var mount = document.getElementById('topbar-mount');
  if (!mount) return;

  mount.outerHTML =
    '<div class="topbar">' +
      '<div class="topbar-items">' +
        '<div class="user-tools" id="userTools" style="display:none">' +
          '<span class="user-pill">' +
            '<span id="topbarUserIcon"></span>' +
            '<span class="user-pill-role" id="topbarRole">-</span>' +
          '</span>' +
          '<span style="color:var(--skin-ink-soft)">|</span>' +
          '<button class="signout-button" id="topbarSignout" type="button">Sign out</button>' +
        '</div>' +
        '<button class="signin-link" id="topbarSignin" style="display:none">Sign in</button>' +
      '</div>' +
    '</div>';

  function refresh() {
    fetch('/api/session').then(function (r) { return r.json(); }).then(function (s) {
      var loggedIn = s.profile > 1;
      document.getElementById('userTools').style.display = loggedIn ? '' : 'none';
      document.getElementById('topbarSignin').style.display = loggedIn ? 'none' : '';
      if (loggedIn) document.getElementById('topbarRole').textContent = PROFILE_NAME[s.profile] || ('Profile ' + s.profile);
      document.dispatchEvent(new CustomEvent('topbar:session', { detail: s }));
    }).catch(function () {});
  }

  // The person icon is sheet-driven (content-tab key "UserIcon"), same
  // mechanism as the board's Logo/AdminIcon — change the icon by editing
  // that cell, not this file. /api/content is public on both pages.
  function sanitizeHtml(html) {
    var div = document.createElement('div');
    div.textContent = html; // parse as text, not HTML
    var temp = document.createElement('div');
    temp.innerHTML = html; // now parse safely with HTMLPurify behavior
    // Remove any script tags, event handlers, or dangerous attributes
    var scripts = temp.querySelectorAll('script');
    scripts.forEach(function (s) { s.remove(); });
    var elements = temp.querySelectorAll('[onclick],[onerror],[onload]');
    elements.forEach(function (e) { e.removeAttribute('onclick'); e.removeAttribute('onerror'); e.removeAttribute('onload'); });
    return temp.innerHTML;
  }
  fetch('/api/content').then(function (r) { return r.json(); }).then(function (d) {
    var icon = (d.content || {}).UserIcon;
    if (icon) document.getElementById('topbarUserIcon').innerHTML = sanitizeHtml(icon);
  }).catch(function () {});

  function csrfToken() {
    var m = document.cookie.match(/(?:^|;\s*)ts2_csrf=([^;]+)/);
    return m ? decodeURIComponent(m[1]) : '';
  }
  document.getElementById('topbarSignout').addEventListener('click', function () {
    fetch('/api/logout', { method: 'POST', headers: { 'X-CSRF-Token': csrfToken() } })
      .then(function () { window.location.href = '/'; });
  });
  document.getElementById('topbarSignin').addEventListener('click', function () {
    document.dispatchEvent(new CustomEvent('topbar:signin-click'));
  });

  window.topbarRefresh = refresh;
  refresh();
})();

</script>
<script>
'use strict';
// Sign in lives on the dashboard; send the user there (returns via Admin link).
document.addEventListener('topbar:signin-click', function () { window.location.href = '/'; });

// Page copy comes from the master content tab (data-content / data-content-ph);
// the hardcoded text is the fallback until a key is filled in the sheet.
(function () {
  fetch('/api/content').then(function (r) { return r.json(); }).then(function (d) {
    var c = (d && d.content) || {};
    document.querySelectorAll('[data-content]').forEach(function (el) {
      var v = c[el.getAttribute('data-content')];
      if (v != null && v !== '') el.textContent = v;
    });
    document.querySelectorAll('[data-content-ph]').forEach(function (el) {
      var v = c[el.getAttribute('data-content-ph')];
      if (v != null && v !== '') el.placeholder = v;
    });
  }).catch(function () {});
})();
let items = [];
const $ = (s) => document.querySelector(s);

function csrf() {
  const m = document.cookie.match(/(?:^|; )ts2_csrf=([^;]+)/);
  return m ? decodeURIComponent(m[1]) : '';
}

function render() {
  const list = $('#list');
  $('#count').textContent = items.length ? items.length + ' waiting' : '';
  if (!items.length) {
    list.innerHTML = '<div class="empty">Queue is empty — nothing waiting for approval.</div>';
    $('#push').disabled = true;
    return;
  }
  let html = '<table><thead><tr><th>From</th><th>Task</th><th style="width:130px">Decision</th></tr></thead><tbody>';
  items.forEach((it, i) => {
    html += '<tr><td>' + esc(it.reporter || '?') +
      '<div class="meta">' + esc(it.reportDate || '') + (it.origin === 'user' ? '<span class="pill">typed by user</span>' : '<span class="pill">chat</span>') + '</div></td>' +
      '<td><div class="task">' + esc(it.name) + '</div>' +
      '<div class="meta">' + esc(it.project || '') + ' · ' + esc(it.status || 'open') + '</div></td>' +
      '<td><select data-i="' + i + '">' +
      '<option value="">— decide —</option>' +
      '<option value="real">real task</option>' +
      '<option value="routine">routine</option>' +
      '<option value="silly">silly → my notes</option>' +
      '<option value="reject">reject</option>' +
      '</select></td></tr>';
  });
  html += '</tbody></table>';
  list.innerHTML = html;
  list.querySelectorAll('select').forEach((sel) => {
    sel.addEventListener('change', () => {
      sel.className = sel.value === 'silly' ? 'silly' : sel.value === 'reject' ? 'reject' : '';
      $('#push').disabled = !anyDecided();
    });
  });
  $('#push').disabled = true;
}

function anyDecided() {
  return Array.from(document.querySelectorAll('#list select')).some((s) => s.value);
}

function esc(s) { const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }

async function load() {
  $('#msg').textContent = 'Loading…'; $('#msg').className = '';
  try {
    const r = await fetch('/api/admin/queue', { credentials: 'same-origin' });
    const d = await r.json();
    if (!d.ok) {
      if (r.status === 403 || /admin only/i.test(d.error || '')) {
        $('#msg').textContent = '';
        $('#list').innerHTML = '<div class="empty">This page is for signed-in admins.<br><br>'
          + '<a class="back" href="index.html" style="font-size:14px">Go to sign in &rarr;</a></div>';
        return;
      }
      throw new Error(d.error || 'load failed');
    }
    items = d.items || [];
    $('#msg').textContent = '';
    render();
  } catch (e) {
    $('#msg').textContent = 'Could not load the queue: ' + e.message; $('#msg').className = 'err';
  }
}

async function push() {
  const decisions = [];
  document.querySelectorAll('#list select').forEach((sel) => {
    if (sel.value) decisions.push({ row: items[Number(sel.dataset.i)].row, tag: sel.value });
  });
  if (!decisions.length) return;
  $('#push').disabled = true;
  $('#msg').textContent = 'Pushing ' + decisions.length + ' decision(s)…'; $('#msg').className = '';
  try {
    const r = await fetch('/api/admin/queue/decide', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json', 'x-csrf-token': csrf() },
      body: JSON.stringify({ decisions }),
    });
    const d = await r.json();
    $('#msg').textContent = d.message || (d.ok ? 'Done.' : 'Some decisions failed.');
    $('#msg').className = d.ok ? 'ok' : 'err';
    await load();
  } catch (e) {
    $('#msg').textContent = 'Push failed: ' + e.message; $('#msg').className = 'err';
    $('#push').disabled = false;
  }
}

$('#refresh').addEventListener('click', load);
$('#push').addEventListener('click', push);
load();
</script></body></html>
